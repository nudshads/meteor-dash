<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Meteor Dash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #05060f;
    overflow: hidden;
    touch-action: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  #wrap { position: relative; width: 100%; height: 100%; touch-action: none; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  #banner {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: center;
    padding: 8px 0 0 0;
    pointer-events: none;
    z-index: 5;
  }
  #banner img {
    max-width: 60%;
    height: auto;
    max-height: 56px;
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
  }

  #hud {
    position: absolute; top: 66px; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: 0 20px;
    color: #e8ecff;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }
  #score { font-size: 24px; font-weight: 700; letter-spacing: 1px; text-shadow: 0 0 12px rgba(94,234,212,0.6); }
  #meta { font-size: 13px; opacity: 0.75; margin-top: 4px; }
  #coinsHud { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 700; color: #ffd76a; text-shadow: 0 0 10px rgba(255,215,106,0.5); }
  #coinsHud .dot { width: 12px; height: 12px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff6d0, #ffd76a 55%, #b8860b); }

  #toast {
    position: absolute; top: 40%; left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    transform: translateY(10px);
  }
  #toast span {
    display: inline-block;
    background: linear-gradient(90deg, #5eead4, #a78bfa);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(167,139,250,0.4);
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, rgba(20,20,45,0.94), rgba(5,6,15,0.98));
    color: #e8ecff;
    text-align: center;
    padding: 24px;
    overflow-y: auto;
  }
  #overlay h1 {
    font-size: 38px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #5eead4, #a78bfa);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
  }
  #overlay p { opacity: 0.75; margin-bottom: 18px; font-size: 14px; line-height: 1.5; max-width: 300px; }
  #overlay .stat { font-size: 16px; margin-bottom: 4px; }
  #overlay .stat b { color: #5eead4; }
  #overlay .coinLine { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 17px; font-weight: 700; color: #ffd76a; margin-bottom: 20px; }
  #overlay .coinLine .dot { width: 14px; height: 14px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff6d0, #ffd76a 55%, #b8860b); }

  .btnRow { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button.primary {
    background: linear-gradient(135deg, #5eead4, #6366f1);
    border: none;
    color: #05060f;
    font-weight: 700;
    font-size: 17px;
    padding: 13px 32px;
    border-radius: 999px;
    box-shadow: 0 8px 24px rgba(99,102,241,0.4);
  }
  button.secondary {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: #e8ecff;
    font-weight: 600;
    font-size: 15px;
    padding: 12px 26px;
    border-radius: 999px;
  }
  button:active { transform: scale(0.96); }

  #skinGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 340px;
    margin-bottom: 20px;
  }
  .skinCard {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 10px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer;
  }
  .skinCard.selected { border-color: #5eead4; box-shadow: 0 0 16px rgba(94,234,212,0.4); }
  .skinCard.locked { opacity: 0.55; }
  .skinCard canvas { width: 46px; height: 46px; }
  .skinCard .name { font-size: 11px; font-weight: 600; }
  .skinCard .cost { font-size: 10px; color: #ffd76a; display: flex; align-items: center; gap: 3px; }
  .skinCard .cost .dot { width: 8px; height: 8px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff6d0, #ffd76a 55%, #b8860b); }

  #ctrlLeft, #ctrlRight {
    position: absolute;
    bottom: 28px;
    width: 68px; height: 68px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    color: #e8ecff;
    font-size: 28px;
    user-select: none;
    z-index: 6;
    backdrop-filter: blur(2px);
    touch-action: none;
  }
  #ctrlLeft { left: 22px; }
  #ctrlRight { right: 22px; }
  #ctrlLeft.active, #ctrlRight.active { background: rgba(94,234,212,0.22); border-color: rgba(94,234,212,0.6); }

  #muteBtn {
    position: absolute;
    top: 66px; right: 20px;
    font-size: 20px;
    background: none; border: none;
    color: #e8ecff; opacity: 0.8;
    pointer-events: auto;
    z-index: 6;
  }

  .musicRow { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 18px; }
  .musicChip {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.16);
    color: #e8ecff;
    font-size: 12px; font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
  }
  .musicChip.selected { background: rgba(94,234,212,0.18); border-color: #5eead4; color: #5eead4; }

  #bossBar {
    position: absolute; top: 96px; left: 50%; transform: translateX(-50%);
    width: 72%; max-width: 300px;
    display: none;
    z-index: 6;
    text-align: center;
  }
  #bossBar .label {
    font-size: 12px; font-weight: 800; letter-spacing: 1.5px;
    color: #ff8a5c;
    text-shadow: 0 0 10px rgba(255,106,61,0.7);
    margin-bottom: 4px;
  }
  #bossBar .track { height: 8px; border-radius: 6px; background: rgba(255,255,255,0.14); overflow: hidden; }
  #bossBar .fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff6a3d, #ffd23f); }
</style>
</head>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score');
  const metaEl = document.getElementById('meta');
  const coinsRunEl = document.getElementById('coinsRun');
  const toast = document.getElementById('toast');
  const toastText = document.getElementById('toastText');
  const bossBar = document.getElementById('bossBar');
  const bossFill = document.getElementById('bossFill');

  let W, H, DPR;
  function resize() {
    DPR = window.devicePixelRatio || 1;
    W = canvas.clientWidth = window.innerWidth;
    H = canvas.clientHeight = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- persistence ----------
  const SKINS = [
    { id: 'nebula', name: 'Nebula', cost: 0,   colors: ['#a78bfa', '#5eead4'], glow: 'rgba(94,234,212,0.9)' },
    { id: 'inferno', name: 'Inferno', cost: 50,  colors: ['#ff6a3d', '#ffd23f'], glow: 'rgba(255,140,60,0.9)' },
    { id: 'glacier', name: 'Glacier', cost: 120, colors: ['#60a5fa', '#e0f2fe'], glow: 'rgba(96,165,250,0.9)' },
    { id: 'toxic',   name: 'Toxic',   cost: 200, colors: ['#84cc16', '#d9f99d'], glow: 'rgba(163,230,53,0.9)' },
    { id: 'gold',    name: 'Gold',    cost: 350, colors: ['#facc15', '#fff3b0'], glow: 'rgba(250,204,21,0.9)' }
  ];

  function load(key, fallback) {
    try {
      const v = localStorage.getItem(key);
      return v === null ? fallback : JSON.parse(v);
    } catch (e) { return fallback; }
  }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  let best = load('md_best', 0);
  let totalCoins = load('md_coins', 0);
  let unlockedSkins = load('md_unlocked', ['nebula']);
  let selectedSkinId = load('md_selected', 'nebula');
  let musicChoice = load('md_music', 'off');
  let muted = load('md_muted', false);

  function getSkin(id) { return SKINS.find(s => s.id === id) || SKINS[0]; }

  // ---------- music engine (procedural, no external files) ----------
  const MusicEngine = (function() {
    let actx = null, master = null, timer = null, currentId = 'off';
    const TRACKS = {
      drift: { wave: 'sine', step: 0.55, gain: 0.16,
        notes: [220, 262, 0, 330, 294, 0, 262, 0, 220, 0, 196, 0, 220, 262, 330, 0] },
      pulse: { wave: 'square', step: 0.20, gain: 0.09,
        notes: [196, 0, 196, 233, 196, 0, 262, 0, 220, 0, 220, 262, 220, 0, 175, 0] },
      orbit: { wave: 'triangle', step: 0.32, gain: 0.13,
        notes: [174, 220, 261, 220, 196, 233, 293, 233, 174, 220, 261, 293, 220, 196, 174, 0] }
    };
    function ensureCtx() {
      if (!actx) {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain();
        master.gain.value = muted ? 0 : 1;
        master.connect(actx.destination);
      }
      if (actx.state === 'suspended') actx.resume();
    }
    function playNote(freq, wave, dur, gainVal) {
      const osc = actx.createOscillator();
      const g = actx.createGain();
      osc.type = wave;
      osc.frequency.value = freq;
      g.gain.value = 0;
      osc.connect(g);
      g.connect(master);
      const t = actx.currentTime;
      g.gain.linearRampToValueAtTime(gainVal, t + 0.02);
      g.gain.linearRampToValueAtTime(0, t + dur * 0.95);
      osc.start(t);
      osc.stop(t + dur);
    }
    function loop(trackDef, i) {
      if (currentId === 'off') return;
      const freq = trackDef.notes[i % trackDef.notes.length];
      if (freq > 0) playNote(freq, trackDef.wave, trackDef.step, trackDef.gain);
      timer = setTimeout(() => loop(trackDef, i + 1), trackDef.step * 1000);
    }
    function play(id) {
      currentId = id;
      clearTimeout(timer);
      if (id === 'off') return;
      ensureCtx();
      loop(TRACKS[id], 0);
    }
    function pauseForBackground() {
      clearTimeout(timer);
      if (actx && actx.state === 'running') actx.suspend();
    }
    function resumeFromBackground() {
      if (currentId === 'off' || !actx) return;
      actx.resume();
      clearTimeout(timer);
      loop(TRACKS[currentId], 0);
    }
    function stopAll() {
      clearTimeout(timer);
      currentId = 'off';
      if (actx) { actx.close(); actx = null; master = null; }
    }
    function setMuted(m) {
      muted = m;
      if (master) master.gain.value = m ? 0 : 1;
    }
    return { play, setMuted, ensureCtx, pauseForBackground, resumeFromBackground, stopAll };
  })();

  // ---------- game state ----------
  let running = false;
  let score = 0, elapsed = 0, level = 1, coinsThisRun = 0;
  let meteors = [], coins = [], stars = [];
  let ship, pointerX, dragging = false;
  let lastTime = 0, spawnTimer = 0, coinSpawnTimer = 0;
  let leftHeld = false, rightHeld = false;
  const BTN_SPEED = 480; // px per second

  // adaptive difficulty
  let difficultyFactor = 1.0;
  let nearMisses = 0, cleanPasses = 0;
  let adaptTimer = 0;

  // boss fight state
  const BOSS_DURATION = 14;
  const LASER_INTERVAL = 1.6, WARN_DURATION = 0.55, FIRE_DURATION = 0.22;
  let bossActive = false, bossLevelTriggered = 0;
  let boss = null, laser = null, laserCycle = 0, bossTimer = 0;

  function initStars() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.6 + 0.3, speed: Math.random() * 40 + 20 });
    }
  }

  function resetGame() {
    score = 0; elapsed = 0; level = 1; coinsThisRun = 0;
    meteors = []; coins = [];
    spawnTimer = 0; coinSpawnTimer = 1.2;
    difficultyFactor = 1.0; nearMisses = 0; cleanPasses = 0; adaptTimer = 0;
    bossActive = false; bossLevelTriggered = 0; boss = null; laser = null; laserCycle = 0; bossTimer = 0;
    bossBar.style.display = 'none';
    ship = { x: W / 2, y: H - 110, w: 34, h: 34 };
    pointerX = W / 2;
    initStars();
    coinsRunEl.textContent = '0';
    updateHud();
  }

  function updateHud() {
    scoreEl.textContent = Math.floor(score);
    metaEl.textContent = 'Level ' + level + ' · Best: ' + best;
    coinsRunEl.textContent = coinsThisRun;
  }

  function showToast(msg) {
    toastText.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1300);
  }

  function spawnMeteor() {
    const size = Math.random() * 22 + 16;
    const baseSpeed = 110 + level * 14;
    meteors.push({
      x: Math.random() * (W - size) + size / 2,
      y: -size,
      r: size / 2,
      speed: (baseSpeed + Math.random() * 60) * difficultyFactor,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 3,
      closeFlag: false,
      passed: false
    });
  }

  function spawnCoin() {
    const r = 11;
    coins.push({
      x: Math.random() * (W - r * 2) + r,
      y: -r,
      r,
      speed: 130 + level * 6,
      spin: Math.random() * Math.PI * 2
    });
  }

  function circleHit(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    return Math.sqrt(dx * dx + dy * dy) < ar + br;
  }

  function startBoss() {
    bossActive = true;
    bossLevelTriggered = level;
    bossTimer = BOSS_DURATION;
    meteors = []; coins = [];
    boss = { x: W / 2, y: 100, phase: 0 };
    laser = { stage: 'idle', x: W / 2, warnT: 0, fireT: 0, width: 46 };
    laserCycle = 1.1;
    bossBar.style.display = 'block';
    bossFill.style.width = '100%';
    showToast('⚠ SAM THE BOSS ⚠');
  }

  function endBoss() {
    bossActive = false;
    bossBar.style.display = 'none';
    boss = null; laser = null;
    const bonus = 40 + level * 8;
    coinsThisRun += bonus;
    spawnTimer = 0.6;
    showToast('BOSS DEFEATED!  +' + bonus + ' coins');
  }

  function update(dt) {
    elapsed += dt;
    score += dt * 10;

    // level progression — every 18s
    const newLevel = 1 + Math.floor(elapsed / 18);
    if (newLevel !== level) {
      level = newLevel;
      if (level % 3 === 0 && bossLevelTriggered !== level && !bossActive) {
        startBoss();
      } else {
        const bonus = level * 5;
        coinsThisRun += bonus;
        showToast('LEVEL ' + level + '!  +' + bonus + ' coins');
      }
    }

    // on-screen buttons move pointerX directly; otherwise ease toward pointer/drag target
    if (leftHeld) pointerX = Math.max(0, pointerX - BTN_SPEED * dt);
    if (rightHeld) pointerX = Math.min(W, pointerX + BTN_SPEED * dt);
    ship.x += (pointerX - ship.x) * Math.min(dt * 10, 1);
    ship.x = Math.max(ship.w / 2, Math.min(W - ship.w / 2, ship.x));

    for (const s of stars) {
      s.y += s.speed * dt;
      if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    }

    // ---- adaptive difficulty: evaluate performance every 3s ----
    adaptTimer += dt;
    if (adaptTimer >= 3) {
      adaptTimer = 0;
      const total = nearMisses + cleanPasses;
      if (total >= 2) {
        const struggleRatio = nearMisses / total;
        if (struggleRatio > 0.5) {
          difficultyFactor = Math.max(0.7, difficultyFactor - 0.08);
        } else if (struggleRatio < 0.15) {
          difficultyFactor = Math.min(1.8, difficultyFactor + 0.10);
        } else {
          difficultyFactor = Math.min(1.8, difficultyFactor + 0.03);
        }
      }
      nearMisses = 0; cleanPasses = 0;
    }

    const shipHitR = ship.w * 0.36;

    if (bossActive) {
      bossTimer -= dt;
      bossFill.style.width = Math.max(0, (bossTimer / BOSS_DURATION) * 100) + '%';
      boss.phase += dt;
      const amp = Math.min(W * 0.32, 140);
      boss.x = W / 2 + Math.sin(boss.phase * 1.1) * amp;
      boss.x = Math.max(60, Math.min(W - 60, boss.x));

      laserCycle -= dt;
      if (laser.stage === 'idle' && laserCycle <= 0) {
        laser.stage = 'warn';
        laser.warnT = 0;
        laser.x = ship.x + (Math.random() - 0.5) * 40;
        laser.x = Math.max(30, Math.min(W - 30, laser.x));
      } else if (laser.stage === 'warn') {
        laser.warnT += dt;
        if (laser.warnT >= WARN_DURATION) { laser.stage = 'fire'; laser.fireT = 0; }
      } else if (laser.stage === 'fire') {
        laser.fireT += dt;
        if (Math.abs(ship.x - laser.x) < (laser.width / 2 + shipHitR * 0.7)) { gameOver(); return; }
        if (laser.fireT >= FIRE_DURATION) { laser.stage = 'idle'; laserCycle = LASER_INTERVAL; }
      }

      if (bossTimer <= 0) endBoss();
      updateHud();
      return;
    }

    // spawn meteors — interval shrinks with level, scaled by difficulty
    const spawnInterval = Math.max((0.85 - level * 0.03) / difficultyFactor, 0.22);
    spawnTimer -= dt;
    if (spawnTimer <= 0) { spawnMeteor(); spawnTimer = spawnInterval; }

    coinSpawnTimer -= dt;
    if (coinSpawnTimer <= 0) { spawnCoin(); coinSpawnTimer = 2.4 + Math.random() * 1.6; }

    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      m.y += m.speed * dt;
      m.rot += m.rotSpeed * dt;

      const dist = Math.hypot(ship.x - m.x, ship.y - m.y);
      const hitDist = shipHitR + m.r * 0.82;
      if (!m.closeFlag && dist < hitDist * 1.7) m.closeFlag = true;

      if (dist < hitDist) { gameOver(); return; }

      if (m.y - m.r > H) {
        if (!m.passed) {
          m.passed = true;
          if (m.closeFlag) nearMisses++; else cleanPasses++;
        }
        meteors.splice(i, 1);
      }
    }

    for (let i = coins.length - 1; i >= 0; i--) {
      const c = coins[i];
      c.y += c.speed * dt;
      c.spin += dt * 4;
      if (circleHit(ship.x, ship.y, shipHitR, c.x, c.y, c.r * 0.9)) {
        coinsThisRun++;
        coins.splice(i, 1);
        continue;
      }
      if (c.y - c.r > H) coins.splice(i, 1);
    }

    updateHud();
  }

  function drawShip() {
    const skin = getSkin(selectedSkinId);
    ctx.save();
    ctx.translate(ship.x, ship.y);
    const g = ctx.createRadialGradient(0, 16, 2, 0, 16, 18);
    g.addColorStop(0, skin.glow);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(0, 16, 10, 18, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(14, 16);
    ctx.lineTo(0, 8);
    ctx.lineTo(-14, 16);
    ctx.closePath();
    const bodyGrad = ctx.createLinearGradient(0, -18, 0, 16);
    bodyGrad.addColorStop(0, skin.colors[0]);
    bodyGrad.addColorStop(1, skin.colors[1]);
    ctx.fillStyle = bodyGrad;
    ctx.fill();
    ctx.restore();
  }

  function drawMeteor(m) {
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.rot);
    ctx.beginPath();
    const points = 7;
    for (let i = 0; i < points; i++) {
      const ang = (i / points) * Math.PI * 2;
      const rad = m.r * (0.8 + (i % 2 === 0 ? 0.2 : -0.1));
      const px = Math.cos(ang) * rad, py = Math.sin(ang) * rad;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = '#3b2f4f';
    ctx.fill();
    ctx.strokeStyle = 'rgba(167,139,250,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  function drawCoin(c) {
    ctx.save();
    ctx.translate(c.x, c.y);
    const scaleX = Math.abs(Math.cos(c.spin)) * 0.9 + 0.1;
    ctx.scale(scaleX, 1);
    const g = ctx.createRadialGradient(-3, -3, 1, 0, 0, c.r);
    g.addColorStop(0, '#fff6d0');
    g.addColorStop(0.55, '#ffd76a');
    g.addColorStop(1, '#b8860b');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(0, 0, c.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBoss() {
    ctx.save();
    ctx.translate(boss.x, boss.y);
    const g = ctx.createRadialGradient(0, 10, 4, 0, 10, 46);
    g.addColorStop(0, 'rgba(255,106,61,0.55)');
    g.addColorStop(1, 'rgba(255,106,61,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 10, 46, 0, Math.PI * 2); ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-46, 0);
    ctx.lineTo(-14, -22);
    ctx.lineTo(14, -22);
    ctx.lineTo(46, 0);
    ctx.lineTo(20, 18);
    ctx.lineTo(-20, 18);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, -22, 0, 18);
    grad.addColorStop(0, '#7a1f1f');
    grad.addColorStop(1, '#ff6a3d');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,210,63,0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // cockpit
    ctx.beginPath();
    ctx.arc(0, -2, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd23f';
    ctx.fill();
    ctx.restore();
  }

  function drawLaser() {
    if (!laser || laser.stage === 'idle') return;
    const topY = boss.y + 24;
    if (laser.stage === 'warn') {
      const pulse = 0.25 + 0.25 * Math.sin(laser.warnT * 30);
      ctx.fillStyle = `rgba(255,80,60,${pulse})`;
      ctx.fillRect(laser.x - laser.width / 2, topY, laser.width, H - topY);
    } else if (laser.stage === 'fire') {
      const g = ctx.createLinearGradient(laser.x - laser.width / 2, 0, laser.x + laser.width / 2, 0);
      g.addColorStop(0, 'rgba(255,60,40,0.15)');
      g.addColorStop(0.5, 'rgba(255,240,220,0.95)');
      g.addColorStop(1, 'rgba(255,60,40,0.15)');
      ctx.fillStyle = g;
      ctx.fillRect(laser.x - laser.width / 2, topY, laser.width, H - topY);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#05060f';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffffff';
    for (const s of stars) {
      ctx.globalAlpha = 0.5 + Math.random() * 0.3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (bossActive) {
      drawLaser();
      drawBoss();
    } else {
      for (const c of coins) drawCoin(c);
      for (const m of meteors) drawMeteor(m);
    }
    drawShip();
  }

  function loop(t) {
    if (!running) return;
    const dt = Math.min((t - lastTime) / 1000, 0.05);
    lastTime = t;
    update(dt);
    if (!running) return;
    draw();
    requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    bossBar.style.display = 'none';
    const finalScore = Math.floor(score);
    if (finalScore > best) { best = finalScore; save('md_best', best); }
    totalCoins += coinsThisRun;
    save('md_coins', totalCoins);
    renderGameOver(finalScore);
  }

  function startGame() {
    resetGame();
    overlay.style.display = 'none';
    running = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  // ---------- skin preview ----------
  function drawSkinPreview(canvasEl, skin) {
    const c = canvasEl.getContext('2d');
    const w = canvasEl.width, h = canvasEl.height;
    c.clearRect(0, 0, w, h);
    c.save();
    c.translate(w / 2, h / 2 + 6);
    const g = c.createRadialGradient(0, 8, 1, 0, 8, 10);
    g.addColorStop(0, skin.glow);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = g;
    c.beginPath(); c.ellipse(0, 8, 6, 10, 0, 0, Math.PI * 2); c.fill();
    c.beginPath();
    c.moveTo(0, -12); c.lineTo(9, 10); c.lineTo(0, 5); c.lineTo(-9, 10); c.closePath();
    const grad = c.createLinearGradient(0, -12, 0, 10);
    grad.addColorStop(0, skin.colors[0]); grad.addColorStop(1, skin.colors[1]);
    c.fillStyle = grad; c.fill();
    c.restore();
  }

  // ---------- overlay screens ----------
  const MUSIC_OPTIONS = [
    { id: 'off', label: 'No Music' },
    { id: 'drift', label: 'Drift' },
    { id: 'pulse', label: 'Pulse' },
    { id: 'orbit', label: 'Orbit' }
  ];

  function renderStart() {
    overlay.innerHTML = `
      <h1>METEOR DASH</h1>
      <p>Drag, use arrow keys, or the on-screen buttons to steer. Grab coins, dodge meteors, level up. The game adapts to how well you're doing.</p>
      <div class="coinLine"><div class="dot"></div><span>${totalCoins} coins</span></div>
      <div class="musicRow" id="musicRow"></div>
      <div class="btnRow">
        <button class="primary" id="startBtn">Start</button>
        <button class="secondary" id="skinsBtn">Select Ship</button>
      </div>
    `;
    const row = document.getElementById('musicRow');
    MUSIC_OPTIONS.forEach(opt => {
      const chip = document.createElement('div');
      chip.className = 'musicChip' + (opt.id === musicChoice ? ' selected' : '');
      chip.textContent = opt.label;
      chip.addEventListener('click', () => {
        musicChoice = opt.id;
        save('md_music', musicChoice);
        MusicEngine.play(musicChoice);
        renderStart();
      });
      row.appendChild(chip);
    });
    overlay.style.display = 'flex';
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('skinsBtn').addEventListener('click', renderSkinSelect);
  }

  function renderSkinSelect() {
    overlay.innerHTML = `
      <h1 style="font-size:28px;">SELECT SHIP</h1>
      <div class="coinLine"><div class="dot"></div><span>${totalCoins} coins</span></div>
      <div id="skinGrid"></div>
      <div class="btnRow"><button class="secondary" id="backBtn">Back</button></div>
    `;
    const grid = document.getElementById('skinGrid');
    SKINS.forEach(skin => {
      const unlocked = unlockedSkins.includes(skin.id);
      const card = document.createElement('div');
      card.className = 'skinCard' + (skin.id === selectedSkinId ? ' selected' : '') + (!unlocked ? ' locked' : '');
      card.innerHTML = `
        <canvas width="46" height="46"></canvas>
        <div class="name">${skin.name}</div>
        ${unlocked ? '' : `<div class="cost"><div class="dot"></div>${skin.cost}</div>`}
      `;
      grid.appendChild(card);
      drawSkinPreview(card.querySelector('canvas'), skin);
      card.addEventListener('click', () => {
        if (unlocked) {
          selectedSkinId = skin.id;
          save('md_selected', selectedSkinId);
          renderSkinSelect();
        } else if (totalCoins >= skin.cost) {
          totalCoins -= skin.cost;
          save('md_coins', totalCoins);
          unlockedSkins.push(skin.id);
          save('md_unlocked', unlockedSkins);
          selectedSkinId = skin.id;
          save('md_selected', selectedSkinId);
          renderSkinSelect();
        } else {
          showToast('Need ' + (skin.cost - totalCoins) + ' more coins');
        }
      });
    });
    overlay.style.display = 'flex';
    document.getElementById('backBtn').addEventListener('click', renderStart);
  }

  function renderGameOver(finalScore) {
    overlay.innerHTML = `
      <h1>GAME OVER</h1>
      <div class="stat">Score: <b>${finalScore}</b></div>
      <div class="stat">Level reached: <b>${level}</b></div>
      <div class="stat">Best: <b>${best}</b></div>
      <div class="coinLine"><div class="dot"></div><span>+${coinsThisRun} this run · ${totalCoins} total</span></div>
      <div class="musicRow" id="musicRowGO"></div>
      <div class="btnRow">
        <button class="primary" id="againBtn">Play Again</button>
        <button class="secondary" id="skinsBtn2">Ships</button>
      </div>
    `;
    const row = document.getElementById('musicRowGO');
    MUSIC_OPTIONS.forEach(opt => {
      const chip = document.createElement('div');
      chip.className = 'musicChip' + (opt.id === musicChoice ? ' selected' : '');
      chip.textContent = opt.label;
      chip.addEventListener('click', () => {
        musicChoice = opt.id;
        save('md_music', musicChoice);
        MusicEngine.play(musicChoice);
        renderGameOver(finalScore);
      });
      row.appendChild(chip);
    });
    overlay.style.display = 'flex';
    document.getElementById('againBtn').addEventListener('click', startGame);
    document.getElementById('skinsBtn2').addEventListener('click', renderSkinSelect);
  }

  // ---------- controls ----------
  function setPointer(clientX) {
    const rect = canvas.getBoundingClientRect();
    pointerX = clientX - rect.left;
  }
  canvas.addEventListener('pointerdown', (e) => { dragging = true; setPointer(e.clientX); });
  canvas.addEventListener('pointermove', (e) => { if (dragging) setPointer(e.clientX); });
  window.addEventListener('pointerup', () => { dragging = false; });

  const keys = {};
  window.addEventListener('keydown', (e) => { keys[e.key] = true; });
  window.addEventListener('keyup', (e) => { keys[e.key] = false; });
  setInterval(() => {
    if (!running) return;
    if (keys['ArrowLeft']) pointerX = Math.max(0, pointerX - 12);
    if (keys['ArrowRight']) pointerX = Math.min(W, pointerX + 12);
  }, 16);

  // on-screen left/right buttons
  const ctrlLeft = document.getElementById('ctrlLeft');
  const ctrlRight = document.getElementById('ctrlRight');
  function bindHold(el, setFn) {
    const on = (e) => { e.preventDefault(); setFn(true); el.classList.add('active'); };
    const off = () => { setFn(false); el.classList.remove('active'); };
    el.addEventListener('pointerdown', on);
    el.addEventListener('pointerup', off);
    el.addEventListener('pointercancel', off);
    el.addEventListener('pointerleave', off);
  }
  bindHold(ctrlLeft, (v) => { leftHeld = v; });
  bindHold(ctrlRight, (v) => { rightHeld = v; });

  // mute toggle
  const muteBtn = document.getElementById('muteBtn');
  function refreshMuteIcon() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
  refreshMuteIcon();
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    save('md_muted', muted);
    MusicEngine.setMuted(muted);
    refreshMuteIcon();
  });

  resetGame();
  draw();
  renderStart();
  // resume/start music on first user interaction, respecting saved choice
  window.addEventListener('pointerdown', function initAudioOnce() {
    if (musicChoice !== 'off') MusicEngine.play(musicChoice);
    window.removeEventListener('pointerdown', initAudioOnce);
  }, { once: true });

  // stop/pause music when the page is backgrounded or closed, so it doesn't
  // keep playing after you switch away or lock the phone
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      MusicEngine.pauseForBackground();
    } else if (musicChoice !== 'off') {
      MusicEngine.resumeFromBackground();
    }
  });
  window.addEventListener('pagehide', () => MusicEngine.stopAll());
  window.addEventListener('beforeunload', () => MusicEngine.stopAll());

  // iOS Safari ignores the viewport zoom-disable meta tag in many versions,
  // so block pinch-zoom and double-tap-zoom gestures directly.
  document.addEventListener('gesturestart', (e) => e.preventDefault());
  document.addEventListener('gesturechange', (e) => e.preventDefault());
  document.addEventListener('gestureend', (e) => e.preventDefault());
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
})();
</script>
</body>
</html>
